# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hybrid-rag-backend
  namespace: hybrid-rag
  labels:
    app.kubernetes.io/name: hybrid-rag-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: hybrid-rag-enterprise
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: hybrid-rag-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hybrid-rag-backend
        app.kubernetes.io/component: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: backend
          image: hybrid-rag-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: hybrid-rag-config
            - secretRef:
                name: hybrid-rag-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: data-volume
              mountPath: /data
            - name: chroma-volume
              mountPath: /app/chroma_db
            - name: graph-volume
              mountPath: /app/graph_storage
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: hybrid-rag-data-pvc
        - name: chroma-volume
          persistentVolumeClaim:
            claimName: hybrid-rag-chroma-pvc
        - name: graph-volume
          persistentVolumeClaim:
            claimName: hybrid-rag-graph-pvc
---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: hybrid-rag-backend
  namespace: hybrid-rag
  labels:
    app.kubernetes.io/name: hybrid-rag-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: hybrid-rag-enterprise
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: hybrid-rag-backend
