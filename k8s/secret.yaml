# Secret for sensitive configuration
# NOTE: In production, use a secrets management solution like:
# - AWS Secrets Manager with External Secrets Operator
# - Azure Key Vault with CSI Driver
# - GCP Secret Manager with External Secrets Operator
# - HashiCorp Vault
apiVersion: v1
kind: Secret
metadata:
  name: hybrid-rag-secrets
  namespace: hybrid-rag
  labels:
    app.kubernetes.io/name: hybrid-rag
    app.kubernetes.io/part-of: hybrid-rag-enterprise
type: Opaque
stringData:
  # Replace with actual values or use external secrets management
  OPENAI_API_KEY: "your-openai-api-key-here"
  LANGFUSE_SECRET_KEY: "your-langfuse-secret-key-here"
  LANGFUSE_PUBLIC_KEY: "your-langfuse-public-key-here"
