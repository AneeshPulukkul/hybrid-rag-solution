# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hybrid-rag-frontend
  namespace: hybrid-rag
  labels:
    app.kubernetes.io/name: hybrid-rag-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: hybrid-rag-enterprise
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: hybrid-rag-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hybrid-rag-frontend
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: hybrid-rag-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: hybrid-rag-frontend
  namespace: hybrid-rag
  labels:
    app.kubernetes.io/name: hybrid-rag-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: hybrid-rag-enterprise
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: hybrid-rag-frontend
